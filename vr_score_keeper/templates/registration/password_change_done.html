{% extends "base.html" %}

{% block content %}
    <div style="max-width: 450px; margin: 3rem auto 0 auto;">
        <div class="box has-text-centered p-5">
            <!-- Success Icon -->
            <div class="avatar-wrapper mx-auto mb-4" style="background: rgba(72, 199, 142, 0.1); border: 2px solid var(--accent-green); border-radius: 50%; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(72, 199, 142, 0.25);">
                <i class="fa-solid fa-circle-check fa-2x" style="color: var(--accent-green);"></i>
            </div>
            
            <h1 class="title is-3 mb-2 vr-title">Success!</h1>
            <p class="subtitle is-6 text-muted mb-5">Your password has been changed successfully.</p>
            
            <a href="{% url 'profile' %}" class="button is-primary is-fullwidth">
                <i class="fa-solid fa-arrow-left mr-2"></i> Back to Profile
            </a>
        </div>
    </div>
{% endblock content %}
